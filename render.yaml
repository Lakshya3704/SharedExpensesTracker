services:
  # Backend Web Service
  - type: web
    name: shared-expenses-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && node prisma/seed.js && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        value: dev-secret-key-shared-expenses-2026
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://shared-expenses-frontend.onrender.com,http://localhost:5173

  # Frontend Static Site
  - type: web
    name: shared-expenses-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://shared-expenses-backend-q9ey.onrender.com

